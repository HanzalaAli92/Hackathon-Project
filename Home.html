<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./REsumestyle.css"> <!-- Updated link to the external stylesheet -->
    <title>Resume Creator</title>
</head>
<body>
    
   <main id="content-wrapper">
    <h1 id="header">Resume Creator</h1>
    
    <!-- Section containing buttons for user actions -->
    <section id="action-buttons">
        <!-- Button to start the resume creation process -->
        <input type="button" value="Start" class="action-btn" id="start-action" onclick="startResume()">
        <!-- Button to edit the resume (disabled initially) -->
        <input type="button" value="Edit" class="action-btn" id="edit-action" onclick="editResume()" disabled>
        <!-- Button to download the resume (disabled initially) -->
        <input type="button" value="Download" class="action-btn" id="download-action" onclick="generatePDF()" disabled>
    </section>
    
    <!-- Resume creation form -->
    <section id="resume-form-container">
        <form action="#" id="resume-form">
            <!-- Personal information section -->
            <div id="personal-details">
                <label for="full-name">Full Name:</label>
                <input type="text" id="full-name" placeholder="Taha khan" required>
                <br />
                <label for="email-address">Email:</label>
                <input type="email" id="email-address" placeholder="example@example.com" required>
                <br />
                <label for="phone-number">Phone No.:</label>
                <input type="tel" id="phone-number" placeholder="000-000000-000" required>
                <br />
                <label for="home-address">Address:</label>
                <input type="text" id="home-address" placeholder="Adderess here" required>
            </div>
            
            <!-- Education, work, and skill section -->
            <div id="education-details">
                <label for="profile-summary">Profile Summary:</label>
                <input type="text" id="profile-summary" placeholder="Summary of your resume here" required>
                <br />
                <label for="skills">Skills: (Add comma after each skill to separate)</label>
                <input type="text" id="skills" placeholder="Skill here" required>
                <br />
                <label for="work-experience">Work Experience:</label>
                <textarea id="work-experience" placeholder="Work Experience here" required></textarea>
                <br />
                <label for="education-background">Education:</label>
                <textarea id="education-background" placeholder="Education" required></textarea>
            </div>
            
            <br />
            
            <!-- Button to generate resume -->
            <input id="generate-btn" value="Generate Resume" class="action-btn" onclick="submitForm()">
        </form>
    </section>
    
    <!-- Section to display the generated resume -->
    <div id="resume-display">
        <section id="resume-content">
            <div id="resume-details">
                <h1 id="resume-name"></h1>
                <br />
                <h4 id="resume-email"></h4>
                <br>
                <h4 id="resume-phone"></h4>
                <br />
                <h4 id="resume-address"></h4>
                <br />
                <h3>Profile Summary:</h3>
                <p id="resume-summary"></p>
                <br />
                <h3>Skills:</h3>
                <div id="resume-skills"></div>
                <br /> 
                <h3>Work Experience:</h3>
                <p id="resume-work"></p>
                <br />
                <h3>Education:</h3>
                <p id="resume-education"></p>
            </div>
        </section>
    </div>
   </main> 

   <!-- Link to the external JavaScript file -->
   <script src="./cs_script.js"></script>
   <!-- CDN for PDF Download -->
   <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
   <script>
    // Function for download pdf
    function generatePDF() {
       

    const pdf = document.getElementById('resume-display');

// Ensure Resume-result is displayed
const resumeResult = document.getElementById('resume-content');
resumeResult.style.display = 'block';

setTimeout(() => {
    html2pdf().from(pdf).save();
}, 300);  

    }

   </script>
</body>
</html>
